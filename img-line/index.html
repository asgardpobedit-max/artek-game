<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Символы Победы</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Память победы</h1>

<div id="memoryArea"> 
  <img src="img1/1.png" class="symbolImg">
  <img src="img1/2.png" class="symbolImg">
  <img src="img1/3.png" class="symbolImg">
  <img src="img1/4.png" class="symbolImg">
  <img src="img1/5.png" class="symbolImg">
</div>

<button onclick="startGame()" id="startBtn">Начать игру</button>

<div id="memoryOverlay" class="hidden"></div>

<div id="gameArea" class="hidden">

  <div id="dropZone">
    <div class="slot" data-answer="1"></div>
    <div class="slot" data-answer="2"></div>
    <div class="slot" data-answer="3"></div>
    <div class="slot" data-answer="4"></div>
    <div class="slot" data-answer="5"></div>
  </div>

  <div id="pool">
    <img src="img1/1.png" class="item" draggable="true" data-id="1">
    <img src="img1/2.png" class="item" draggable="true" data-id="2">
    <img src="img1/3.png" class="item" draggable="true" data-id="3">
    <img src="img1/4.png" class="item" draggable="true" data-id="4">
    <img src="img1/5.png" class="item" draggable="true" data-id="5">
  </div>

</div>
<div class="buttons">
  <button onclick="check()" id="checkBtn" class="hidden">Проверить</button>
  <button onclick="nextLevel()" id="nextBtn" class="hidden">Дальше</button>
</div>
<div id="result"></div>

<script src="script.js"></script>

</body>
</html>
