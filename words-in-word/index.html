<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Слова из слова</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Полезные слова</h1>
<div id="bigWord">ЭНЦИКЛОПЕДИЯ</div>

<div class="inputBlock">
  <input id="wordsInput" placeholder="Вводи слова через пробел">
  <p><button onclick="fillWords()">Вставить</button>
</div>


<div class="board" id="board"></div>


<script>
const words = [
  "ДЕПО", "ДЕЛО", "ДИКЦИЯ", "ДНО", "ДОК", "ДОЛ",
  "КЕД", "КИНО", "КЛИН", "КЛИП", "КЛОП", "КЛОН", "КОД", "КОЛ",
  "ЛИК", "ЛИЦО", "ЛЯП",
  "НИЦ",
  "ОПЦИЯ",
  "ПИК", "ПЛЕД", "ПЛЕН", "ПЛОД", "ПОЛ", "ПОЛЕ", "ПОЛК",
  "ЦИКЛ", "ЦИКЛОП", "ЦИКЛОН", "ЦИНК"
];

function createBoard() {
  const board = document.getElementById("board");

  words.forEach(word => {
    let row = document.createElement("div");
    row.className = "row";
    row.dataset.answer = word;

    for (let i = 0; i < word.length; i++) {
      let input = document.createElement("input");
      input.disabled = true;
      row.appendChild(input);
    }

    board.appendChild(row);
  });
}

createBoard();

function fillWords() {

  let input = document.getElementById("wordsInput").value.toUpperCase();
  let entered = input.split(/[\s,]+/).filter(w => w);

  let rows = document.querySelectorAll(".row");

  entered.forEach(word => {

    let row = [...rows].find(r => r.dataset.answer === word);

    if (row && !row.classList.contains("correct")) {

      let inputs = row.querySelectorAll("input");

      for (let i = 0; i < word.length; i++) {
        inputs[i].value = word[i];
      }

      row.classList.add("correct"); // ⭐ важно

    } else {
      flashWrong();
    }

  });

  document.getElementById("wordsInput").value = "";

  checkWin(); // ⭐ проверяем победу
}


function flashWrong() {
  let input = document.getElementById("wordsInput");
  input.style.background = "#ffb3b3";

  setTimeout(() => {
    input.style.background = "white";
  }, 300);
}

function checkWin() {
  let rows = document.querySelectorAll(".row");
  let allCorrect = [...rows].every(r => r.classList.contains("correct"));

  if (allCorrect) {
    setTimeout(() => {
      launchWinEffects();
    }, 200);
  }
}

document.getElementById("wordsInput").addEventListener("keydown", function(event) {
  if (event.key === "Enter") {
    fillWords();
  }
});

function launchWinEffects() {

  // звук
  const sound = document.getElementById("successSound");
  sound.currentTime = 0;
  sound.play();

  // фейерверк
  for (let i = 0; i < 30; i++) {

    let fire = document.createElement("div");
    fire.style.position = "fixed";
    fire.style.left = "50%";
    fire.style.top = "50%";
    fire.style.width = "6px";
    fire.style.height = "6px";
    fire.style.background = `hsl(${Math.random()*360},100%,50%)`;
    fire.style.borderRadius = "50%";
    fire.style.pointerEvents = "none";

    document.body.appendChild(fire);

    let angle = Math.random() * 2 * Math.PI;
    let distance = 150 + Math.random() * 250;

    let x = Math.cos(angle) * distance;
    let y = Math.sin(angle) * distance;

    fire.animate([
      { transform: "translate(0,0)", opacity: 1 },
      { transform: `translate(${x}px, ${y}px)`, opacity: 0 }
    ], {
      duration: 1000,
      easing: "ease-out"
    });

    setTimeout(() => fire.remove(), 1000);
  }

  setTimeout(() => alert("🎉 ВСЕ СЛОВА НАЙДЕНЫ!"), 500);
}

</script>
<audio id="successSound" src="success.mp3"></audio>
</body>
</html>
